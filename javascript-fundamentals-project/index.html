<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Skill Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="badge">Module 4 JavaScript Project</p>
      <h1>Student Skill Dashboard</h1>
      <p class="subtitle">HTML structure, CSS design, and JavaScript logic ka complete practical project.</p>
    </section>

    <section class="panel">
      <h2>Student Registration</h2>
      <form id="studentForm">
        <div class="form-group">
          <label for="studentName">Student Name</label>
          <input id="studentName" type="text" placeholder="Example: Aman Sharma">
        </div>

        <div class="form-group">
          <label for="studentEmail">Email Address</label>
          <input id="studentEmail" type="email" placeholder="Example: aman@gmail.com">
        </div>

        <div class="form-group">
          <label for="studentSkill">Select Skill</label>
          <select id="studentSkill">
            <option value="">Choose a skill</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
          </select>
        </div>

        <div class="form-group">
          <label for="studentLevel">Practice Level</label>
          <input id="studentLevel" type="number" placeholder="Enter level from 1 to 10">
        </div>

        <button type="submit">Add Student</button>
      </form>
      <p id="message" class="message">Fill the form and add a student.</p>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>Live Dashboard</h2>
        <button id="resetBtn" type="button" class="secondary-btn">Reset List</button>
      </div>
      <div id="stats" class="stats">Total Students: 0</div>
      <div id="studentList" class="student-list">
        <p class="empty">No students added yet.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
